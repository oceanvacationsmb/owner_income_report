<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ocean Vacations Owner Portal</title>
</head>
<body>
  <h1>Ocean Vacations Owner Portal</h1>
  <div id="results"></div>
  <script>
    // SET YOUR GUESTY REPORT URL HERE
    const currentOwner = {
      guestyReportUrl: 'https://report.guesty.com/apps/reservations?apiKey=1a58fc1af3815f9023a08e09c590a05f3f3d1c73dbc3ab2e19985ecfe0003aa87acc7e264983e31d5b10a98cf4fd9b4789de3cb864daf2031e42aae6266c92f5'
    };

    document.addEventListener('DOMContentLoaded', () => {
      console.log("JS loaded!");

      if (!currentOwner || !currentOwner.guestyReportUrl) {
        console.error("No owner or Guesty URL configured");
        return;
      }

      fetch(currentOwner.guestyReportUrl)
        .then(response => response.text())
        .then(html => {
          console.log("GUESTY HTML:", html);

          const parser = new DOMParser();
          const doc = parser.parseFromString(html, "text/html");
          const rows = doc.querySelectorAll("table tr");
          console.log("TABLE row count:", rows.length);

          if (rows.length === 0) {
            document.getElementById('results').innerText = "No reservation table found in Guesty HTML.";
          } else {
            let output = "";
            rows.forEach(row => {
              output += row.innerText + "<br>";
            });
            document.getElementById('results').innerHTML = output;
          }
        })
        .catch(err => {
          console.error("Fetch failed:", err);
        });
    });
  </script>
</body>
</html>
