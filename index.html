<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Vacations Owner Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Modern Login Box -->
  <div id="loginBox" class="login-container">
    <div class="login-inner">
      <div class="login-header">Ocean Vacations<br><span>Owner Portal</span></div>
      <input type="email" id="ownerEmail" class="login-input" placeholder="Email" autocomplete="username">
      <div class="password-wrap">
        <input type="password" id="ownerPassword" class="login-input" placeholder="Password" autocomplete="current-password">
        <button id="showPwd" class="show-password" type="button" aria-label="Show password" title="Show password">
          <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 5C6.5 5 2.1 8.4 1 12c1.1 3.6 5.5 7 11 7s9.9-3.4 11-7c-1.1-3.6-5.5-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-2.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6Z"/>
          </svg>
          <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3.3 2 2 3.3l3.1 3.1C3.2 7.8 1.8 9.7 1 12c1.1 3.6 5.5 7 11 7 2.2 0 4.3-.6 6.1-1.6L20.7 20 22 18.7 3.3 2Zm8.7 14a4 4 0 0 1-4-4c0-.7.2-1.4.5-2l5.5 5.5c-.6.3-1.3.5-2 .5Zm9.9-4c-.8-2.6-2.9-4.8-5.7-6.1l-1.6 1.6A4 4 0 0 1 16 12c0 .5-.1 1-.3 1.5l1.9 1.9c1.9-1.1 3.4-2.8 4.3-5.4Z"/>
          </svg>
        </button>
      </div>
      <button id="loginBtn" class="login-btn">Login</button>
      <div id="loginStatus" class="login-status"></div>
    </div>
  </div>

  <div id="ownerPortal" style="display:none;">
    <header class="topbar">
      <div class="topbar-actions">
        <button id="logoutBtn" type="button" class="logout-btn">Sign Out</button>
      </div>
      <div class="brand">OCEAN VACATIONS</div>
      <div class="subtitle">Owner Portal</div>
    </header>

    <div class="container" id="greetingContainer" style="margin-bottom:10px; text-align:left;">
      <div class="greeting-row" style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; width:100%;">
        
        <div class="greeting-main" style="flex:1; min-width:0;">
          <h2 id="greeting" style="margin-bottom:5px;"></h2>
          <div id="propertyAddress" style="font-size:1.13em;color:#3282b8;font-weight:bold;"></div>
        </div>

        <div id="topCalendarBox" style="width:320px; min-width:320px; background:#eef5fb; border-radius:16px; padding:12px; text-align:center;">
  <button id="showCalendarBtn" type="button" style="padding:10px 16px; border:none; border-radius:10px; cursor:pointer; font-size:18px; font-weight:700;" aria-label="Toggle calendar" title="Toggle calendar">
    &#128197;
  </button>
  <div id="calendarToggleSummary" style="text-align:center; margin-top:10px; font-weight:700; font-size:12px;"></div>
</div>
          </div>

          <div id="calendarPanel" style="display:none; margin-top:16px; border:1px solid #d9e6f2; border-radius:14px; padding:12px; background:#f8fbff;">
            <div class="calendar-panel-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px;">
              <button id="calendarPrevBtn" type="button" style="padding:8px 12px; border:none; border-radius:8px; cursor:pointer;">&#8249;</button>
              <div id="calendarMonthLabel" style="font-size:18px; font-weight:700; text-align:center; flex:1;">Calendar</div>
              <button id="calendarNextBtn" type="button" style="padding:8px 12px; border:none; border-radius:8px; cursor:pointer;">&#8250;</button>
            </div>

            <div id="calendarGrid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;"></div>

            <div class="calendar-legend" style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:10px; font-size:12px;">
              <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#2f78b7; margin-right:4px;"></span>Reservation</span>
              <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#0d8a63; margin-right:4px;"></span>VRBO</span>
              <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#9a4d0a; margin-right:4px;"></span>Owner Stay</span>
            </div>

            <div id="calendarBookedNights" style="text-align:center; margin-top:10px; font-weight:700;"></div>
          </div>
        </div>

    <div class="container">
      <!-- Summary -->
      <div class="summary-boxes" id="summaryBoxes"></div>

      <!-- Regular Reservations Table -->
      <h2 id="reservationsTitle" class="section-title" style="text-align:center;">Reservations</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="text-align:center;">Code</th>
              <th style="text-align:center;">Guest Name</th>
              <th style="text-align:center;">Platform</th>
              <th style="text-align:center;">Check In</th>
              <th style="text-align:center;">Check Out</th>
              <th style="text-align:center;">Nights</th>
              <th style="text-align:center;">Accommodation</th>
              <th style="text-align:center;">PMC</th>
              <th style="text-align:center;">Owner Payout</th>
              <th style="text-align:center;">Expected Payout</th>
            </tr>
          </thead>
          <tbody id="reservationsBody"></tbody>
        </table>
      </div>

      <!-- Owner Stay Table (shows only if owner stays) -->
      <div id="ownerStaysTableContainer"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
