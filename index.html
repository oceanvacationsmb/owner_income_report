<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Vacations Owner Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Modern Login Box -->
  <div id="loginBox" class="login-container">
    <div class="login-inner">
      <div class="login-header">Ocean Vacations<br><span>Owner Portal</span></div>
      <input type="email" id="ownerEmail" class="login-input" placeholder="Email" autocomplete="username">
      <div style="position:relative;">
        <input type="password" id="ownerPassword" class="login-input" placeholder="Password" autocomplete="current-password">
        <span id="showPwd" class="show-password">👁️</span>
      </div>
      <button id="loginBtn" class="login-btn">Login</button>
      <div id="loginStatus" class="login-status"></div>
    </div>
  </div>

  <div id="ownerPortal" style="display:none;">
    <header class="topbar">
      <div class="brand">OCEAN VACATIONS</div>
      <div class="subtitle">Owner Portal</div>
    </header>

    <div class="container" id="greetingContainer" style="margin-bottom:10px; text-align:left;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px; width:100%;">
        
        <div style="flex:1; min-width:0;">
          <h2 id="greeting" style="margin-bottom:5px;"></h2>
          <div id="propertyAddress" style="font-size:1.13em;color:#3282b8;font-weight:bold;"></div>
        </div>

        <div id="topCalendarBox" style="width:260px; min-width:260px; background:#eef5fb; border-radius:16px; padding:12px; text-align:center;">
  <button id="showCalendarBtn" type="button" style="padding:10px 16px; border:none; border-radius:10px; cursor:pointer; font-size:14px; font-weight:700;">
    Show Calendar
  </button>
  <div id="calendarBookedNights" style="text-align:center; margin-top:10px; font-weight:700; font-size:12px;"></div>
</div>
          </div>

          <div id="calendarGrid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:2px;"></div>
          <div id="calendarBookedNights" style="text-align:center; margin-top:10px; font-weight:700;"></div>
        </div>

      </div>
    </div>

    <div class="container">
      <!-- Summary -->
      <div class="summary-boxes" id="summaryBoxes"></div>

      <!-- Regular Reservations Table -->
      <h2 class="section-title" style="text-align:center;">Reservations</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="text-align:center;">Code</th>
              <th style="text-align:center;">Platform</th>
              <th style="text-align:center;">Check In</th>
              <th style="text-align:center;">Check Out</th>
              <th style="text-align:center;">Nights</th>
              <th style="text-align:center;">Accommodation</th>
              <th style="text-align:center;">PMC</th>
              <th style="text-align:center;">Owner Payout</th>
              <th style="text-align:center;">Expected Payout</th>
            </tr>
          </thead>
          <tbody id="reservationsBody"></tbody>
        </table>
      </div>

      <!-- Owner Stay Table (shows only if owner stays) -->
      <div id="ownerStaysTableContainer"></div>
    </div>
  </div>

  <div id="calendarModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center; padding:24px;">
    <div style="background:#fff; width:min(1100px, 95vw); border-radius:18px; padding:18px;">
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <button id="calendarModalPrevBtn" type="button" style="padding:8px 12px; border:none; border-radius:8px; cursor:pointer;">&#8249;</button>
        <div id="calendarModalMonthLabel" style="font-size:24px; font-weight:700; text-align:center; flex:1;">Calendar</div>
        <div style="display:flex; gap:8px;">
          <button id="calendarModalCloseBtn" type="button" style="padding:8px 12px; border:none; border-radius:8px; cursor:pointer;">Close</button>
          <button id="calendarModalNextBtn" type="button" style="padding:8px 12px; border:none; border-radius:8px; cursor:pointer;">&#8250;</button>
        </div>
      </div>

      <div id="calendarModalGrid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;"></div>
      <div id="calendarModalBookedNights" style="text-align:center; margin-top:12px; font-weight:700; font-size:18px;"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
