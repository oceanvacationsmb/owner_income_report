<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Vacations Owner Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Modern Login Box -->
  <div id="loginBox" class="login-container">
    <div class="login-inner">
      <div class="login-header">Ocean Vacations<br><span>Owner Portal</span></div>
      <input type="email" id="ownerEmail" class="login-input" placeholder="Email" autocomplete="username">
      <div style="position:relative;">
        <input type="password" id="ownerPassword" class="login-input" placeholder="Password" autocomplete="current-password">
        <span id="showPwd" class="show-password">👁️</span>
      </div>
      <button id="loginBtn" class="login-btn">Login</button>
      <div id="loginStatus" class="login-status"></div>
    </div>
  </div>

  <div id="ownerPortal" style="display:none;">
    <header class="topbar">
      <div class="brand">OCEAN VACATIONS</div>
      <div class="subtitle">Owner Portal</div>
    </header>
    <div class="container" id="greetingContainer" style="margin-bottom:10px; text-align:left;">
  <h2 id="greeting" style="margin-bottom:5px;"></h2>
  <div id="propertyAddress" style="font-size:1.13em;color:#3282b8;font-weight:bold;"></div>
</div>
    <div class="container">
      <!-- Summary -->
      <div class="summary-boxes" id="summaryBoxes"></div>

      <!-- Regular Reservations Table -->
      <h2 class="section-title" style="text-align:center;">Reservations</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
  <th style="text-align:center;">Code</th>
  <th style="text-align:center;">Platform</th>
  <th style="text-align:center;">Check In</th>
  <th style="text-align:center;">Check Out</th>
  <th style="text-align:center;">Nights</th>
  <th style="text-align:center;">Accommodation</th>
  <th style="text-align:center;">PMC</th>
  <th style="text-align:center;">Owner Payout</th>
  <th style="text-align:center;">Expected Payout</th>
            </tr>
          </thead>
          <tbody id="reservationsBody"></tbody>
        </table>
      </div>

      <!-- Owner Stay Table (shows only if owner stays) -->
      <div id="ownerStaysTableContainer"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
