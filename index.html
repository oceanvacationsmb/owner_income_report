<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Vacations Owner Portal</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="brand">OCEAN VACATIONS</div>
    <div class="subtitle">Owner Portal</div>
  </header>

  <div class="container">

    <!-- Modal: Management Request -->
    <div id="requestModal" class="modal" style="display:none;">
      <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h3>Send a Request</h3>
        <form id="ownerRequestForm">
          <label>Subject
            <select id="subject" name="subject" required>
              <option value="">Select an option</option>
              <option value="Request Owner Stay">Request Owner Stay</option>
              <option value="Inquiry about Payout">Inquiry about Payout</option>
              <option value="Inquiry about Reservation">Inquiry about Specific Reservation</option>
            </select>
          </label>

          <div id="dateFields" style="display:none;">
            <label>Check-in Date <input type="date" id="checkInDate" name="checkInDate"></label>
            <label>Check-out Date <input type="date" id="checkOutDate" name="checkOutDate"></label>
            <div id="cleaningAgreement"></div>
          </div>

          <div id="reservationField" style="display:none;">
            <label>Reservation
              <select id="reservationSelect" name="reservationSelect"></select>
            </label>
          </div>

          <label>More information<br>
            <textarea id="extraInfo" name="extraInfo" rows="3" style="width:98%;"></textarea>
          </label>
          <button class="send-btn" type="submit">Send Request</button>
          <div id="ownerReqStatus"></div>
        </form>
      </div>
    </div>
    
    <div id="ownerPortal" style="display:block;">
      <div class="summary-header-flex">
        <div class="summary-header-left">
          <h2 id="greeting"></h2>
          <div class="property-address" id="propertyAddress"></div>
        </div>
        <div class="summary-header-right">
          <div id="weatherBox"></div>
          <button id="openRequestBox" class="request-btn">Contact Management</button>
        </div>
      </div>

      <div class="summary-boxes" id="summaryBoxes"></div>

      <div class="card">
        <h3>Reservations</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Reservation Code</th>
                <th>Platform</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Accommodation</th>
                <th>PMC</th>
                <th>Owner Payout</th>
                <th>Expected Payout</th>
              </tr>
            </thead>
            <tbody id="reservationsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
